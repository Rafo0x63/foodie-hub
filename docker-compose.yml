services:
  db:
    image: mysql:8.0
    container_name: recipes-mysql
    restart: always
    environment:
      MYSQL_DATABASE: foodie-hub
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - cicd-net

  # ---- Jenkins ----
  jenkins:
    build:
      context: .
      dockerfile: jenkins.Dockerfile
    image: foodie-hub-jenkins:lts-jdk21
    container_name: jenkins
    user: root
    ports:
      - "8082:8080"      # 8082 jer 8080 koristi Spring Boot, a 8081 EDB Apache
      - "50010:50000"
    environment:
      - JAVA_OPTS=-Xmx1g
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock     # daje Jenkinsu pristup Dockeru
    restart: unless-stopped
    networks:
      - cicd-net

  # ---- SonarQube ----
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      - sonar-db
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_ext:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    networks:
      - cicd-net

  # ---- PostgreSQL za SonarQube ----
  sonar-db:
    image: postgres:16-alpine
    container_name: sonar-db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cicd-net

volumes:
  db_data:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_ext:
  sonar_db_data:

networks:
  cicd-net:
    driver: bridge