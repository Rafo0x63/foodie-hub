# ========== Profil: prod (PostgreSQL, Render) ==========
# Render postavlja DATABASE_URL u JDBC-friendly formatu samo ako je
# odabran Render Postgres pri stvaranju Web Servicea. U suprotnom,
# treba ga konvertirati: postgres://... → jdbc:postgresql://...

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Disable H2 konzola u produkciji!
spring.h2.console.enabled=false

# Thymeleaf — keširanje uključeno
spring.thymeleaf.cache=true

# Actuator — samo health za produkciju
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Logging — manje glasno
logging.level.root=WARN
logging.level.hr.tvz.quotes=INFO
