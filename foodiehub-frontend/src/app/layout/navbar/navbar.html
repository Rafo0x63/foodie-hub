<nav class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/80 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 md:px-6 lg:px-8">
    <div class="flex items-center gap-2 text-xl font-semibold text-slate-900">
      <a [routerLink]="['/']"><i class="pi pi-book text-[32px] text-orange-500"></i>
      <span class="text-2xl"> FoodieHub</span></a>
    </div>

    <div class="hidden items-center gap-8 text-sm font-medium text-slate-600 md:flex">
      <a [routerLink]="['/recipe-list']" class="hover:text-orange-500 transition">Recepti</a>
      <a href="#" class="hover:text-orange-500 transition">Kuhari</a>
      <a href="#" class="hover:text-orange-500 transition">Kategorije</a>
      <a href="#" class="hover:text-orange-500 transition">Planer</a>
    </div>

    <div class="flex items-center gap-3">
      @if (authService.currentUser()) {
        <span class="text-sm font-medium text-slate-700">Pozdrav, {{ authService.currentUser()?.name }}</span>
        <p-button label="Odjava" (onClick)="logout()" severity="secondary" styleClass="!rounded-xl !px-4 !py-2 !text-sm !bg-white !border !border-slate-300 !text-slate-700 hover:!bg-slate-50"></p-button>
      } @else {
        <p-button label="Prijava" (onClick)="toLogin()" severity="secondary" styleClass="!rounded-xl !px-4 !py-2 !text-sm !bg-white !border !border-slate-300 !text-slate-700 hover:!bg-slate-50"></p-button>
        <p-button label="Registracija" (onClick)="toRegister()" styleClass="!rounded-xl !px-4 !py-2 !text-sm !bg-orange-500 !border-orange-500 hover:!bg-orange-600"></p-button>
      }
    </div>

  </div>
</nav>
