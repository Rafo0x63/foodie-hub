<div class="p-6">

  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold">Admin Dashboard</h1>
      <p class="text-gray-500">Manage users and system access</p>
    </div>

    <p-button
      label="Add User"
      icon="pi pi-user-plus"
      styleClass="!rounded-xl !px-5 !py-3"
      (onClick)="openCreateUser()"
    ></p-button>
  </div>

  <div class="grid grid-cols-3 gap-4 mb-6">

    <div class="bg-white p-4 rounded-2xl shadow">
      <div class="text-gray-500">Total Users</div>
      <div class="text-2xl font-bold">{{ users.length }}</div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <div class="text-gray-500">Admins</div>
      <div class="text-2xl font-bold">{{ adminCount }}</div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <div class="text-gray-500">Active</div>
      <div class="text-2xl font-bold">{{ activeCount }}</div>
    </div>

  </div>

  <div class="bg-white shadow-md rounded-2xl p-4">

    <p-table
      [value]="users"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 20, 50]"
      responsiveLayout="scroll"
      styleClass="p-datatable-sm p-datatable-striped"
    >

      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th class="text-right">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.id }}</td>
          <td class="font-medium">{{ user.name }}</td>
          <td>{{ user.email }}</td>

          <td class="text-right">
            <div class="flex justify-end gap-2">

              <p-button
                icon="pi pi-trash"
                severity="danger"
                styleClass="!rounded-lg"
                (onClick)="deleteUser(user)"
              ></p-button>

            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="text-center text-gray-500 py-6">
            No users found
          </td>
        </tr>
      </ng-template>

    </p-table>

  </div>
</div>
